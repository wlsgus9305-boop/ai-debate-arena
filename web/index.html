<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AI Debate Arena</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>AI Debate Arena</h1>
        <p id="statusText">대기 중</p>
      </div>
      <div class="status-pill" id="connectionStatus">연결 중</div>
    </header>

    <main class="layout">
      <aside class="control-panel">
        <section class="panel-section">
          <h2>토론 설정</h2>
          <label class="field" for="modeSelect">
            <span>진행 모드</span>
            <select id="modeSelect">
              <option value="debate">일반 토론</option>
              <option value="mafia">마피아 게임</option>
            </select>
          </label>
          <div class="template-row" id="templateRow">
            <button type="button" class="template-btn" data-template="tech">기술검토</button>
            <button type="button" class="template-btn" data-template="support">지원요청</button>
            <button type="button" class="template-btn" data-template="product">제품기획</button>
            <button type="button" class="template-btn" data-template="risk">리스크</button>
          </div>
          <label class="field" for="topic">
            <span id="topicLabel">토론 주제</span>
            <textarea id="topic" rows="4">Jira 기반 기술지원 업무 자동화 구조를 어떻게 설계하면 좋을까?</textarea>
          </label>
          <section class="actions">
            <button id="startBtn" type="button">시작</button>
            <button id="stopBtn" type="button">중지</button>
          </section>

          <div class="small-grid">
            <label class="field" for="maxDays">
              <span>최대 일수</span>
              <input id="maxDays" type="number" min="1" max="7" value="3">
            </label>
            <label class="field" for="dayRounds">
              <span>낮 발언 라운드</span>
              <input id="dayRounds" type="number" min="1" max="3" value="1">
            </label>
          </div>
        </section>

        <section class="panel-section">
          <div class="section-head">
            <h2>CLI 연결</h2>
            <button id="openConnectionsBtn" type="button">연결 관리</button>
          </div>
        </section>

        <section class="panel-section mafia-options" id="mafiaOptions">
          <div class="section-head">
            <h2>역할 수</h2>
            <button id="applyRecommendBtn" type="button">추천 적용</button>
          </div>
          <div class="recommend" id="recommendText">추천 계산 중</div>
          <div class="role-grid">
            <label class="field" for="mafiaCount">
              <span>마피아</span>
              <input id="mafiaCount" type="number" min="1" value="2">
            </label>
            <label class="field" for="policeCount">
              <span>경찰</span>
              <input id="policeCount" type="number" min="0" value="1">
            </label>
            <label class="field" for="doctorCount">
              <span>의사</span>
              <input id="doctorCount" type="number" min="0" value="1">
            </label>
          </div>
        </section>

        <section class="panel-section switches">
          <label class="toggle">
            <input id="interruptEnabled" type="checkbox" checked>
            <span>돌발 발언</span>
          </label>
          <label class="toggle">
            <input id="spectatorRevealRoles" type="checkbox" checked>
            <span>관전자 역할 공개</span>
          </label>
          <label class="toggle">
            <input id="dryRun" type="checkbox">
            <span>드라이런</span>
          </label>
        </section>

        <section class="panel-section">
          <div class="section-head">
            <h2>플레이어</h2>
            <button id="addPlayerBtn" type="button">AI 추가</button>
          </div>
          <div class="players" id="players"></div>
        </section>

      </aside>

      <section class="arena">
        <div class="arena-head">
          <div>
            <h2>관전석</h2>
            <p id="sessionMeta">아직 세션이 시작되지 않았습니다.</p>
          </div>
          <div class="arena-actions">
            <button id="returnLiveBtn" class="return-live-btn" type="button" hidden>실시간 회의로 돌아가기</button>
            <button id="clearBtn" type="button">지우기</button>
          </div>
        </div>

        <div class="role-board" id="roleBoard"></div>
        <div class="insight-panel" id="insightPanel">
          <div>
            <strong>토론 요약</strong>
            <p id="insightSummary">토론을 시작하면 핵심 흐름이 여기에 정리됩니다.</p>
          </div>
          <div>
            <strong>다음 액션</strong>
            <p id="insightAction">참가자와 주제를 정한 뒤 시작하세요.</p>
          </div>
        </div>
        <div class="history-panel">
          <div class="history-head">
            <div>
              <strong>지난 판</strong>
              <p>완료된 토론과 마피아 게임을 다시 봅니다.</p>
            </div>
            <button id="refreshHistoryBtn" type="button">새로고침</button>
          </div>
          <div class="history-list" id="sessionHistory"></div>
        </div>
        <div class="timeline" id="timeline"></div>
        <button class="scroll-bottom-btn" id="scrollBottomBtn" type="button" aria-label="맨 아래로 이동" hidden>↓</button>
        <div class="watch-dock" id="watchDock">
          <div class="activity-panel" id="activityPanel">
            <div class="activity-dot"></div>
            <div>
              <strong id="activityTitle">대기 중</strong>
              <p id="activityDetail">새 세션을 시작하면 사회자와 AI 상태가 여기에 표시됩니다.</p>
            </div>
          </div>
          <div class="follow-up-panel" id="followUpPanel" hidden>
            <div class="follow-up-head">
              <div>
                <strong id="followUpTitle">참여자</strong>
                <p id="followUpDescription">회의에 참여 중인 AI입니다.</p>
              </div>
              <button id="toggleFollowUpBtn" type="button">숨기기</button>
            </div>
            <div class="follow-up-list" id="followUpList"></div>
          </div>
          <div class="life-panel" id="lifePanel">
            <div>
              <strong>생존</strong>
              <div class="life-list" id="aliveList"></div>
            </div>
            <div>
              <strong>사망/처형</strong>
              <div class="life-list" id="deadList"></div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <div class="modal-backdrop" id="connectionsModal" hidden>
      <section class="connection-modal" role="dialog" aria-modal="true" aria-labelledby="connectionsTitle">
        <div class="modal-head">
          <div>
            <h2 id="connectionsTitle">AI 연결 관리</h2>
            <p>계정과 연결 방법을 확인합니다.</p>
          </div>
          <div class="modal-actions">
            <button id="refreshConnectionsBtn" type="button">새로고침</button>
            <button id="closeConnectionsBtn" type="button" aria-label="닫기">닫기</button>
          </div>
        </div>
        <div class="integration-list" id="integrationList"></div>
      </section>
    </div>

    <script src="/app.js" type="module"></script>
  </body>
</html>
